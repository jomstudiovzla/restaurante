<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .icon { fill: url(#g); }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f59e0b; }
      .icon { fill: #0f172a; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6"/>
  <!-- QR code pattern simplified -->
  <rect class="icon" x="6" y="6" width="8" height="8" rx="1.5"/>
  <rect class="icon" x="18" y="6" width="8" height="8" rx="1.5"/>
  <rect class="icon" x="6" y="18" width="8" height="8" rx="1.5"/>
  <rect class="icon" x="20" y="20" width="4" height="4" rx="1"/>
  <rect class="icon" x="14" y="14" width="4" height="4" rx="1"/>
</svg>
